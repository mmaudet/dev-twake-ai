<!DOCTYPE html>
<html lang="{{.Locale}}">
<head>
  <meta charset="utf-8">
  <title>{{.AppName}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" type="text/css" href="//{{.Domain}}/assets/fonts/fonts.css">
  {{.CozyFonts}}
  {{.ThemeCSS}}
  <link rel="stylesheet" href="bar.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #faf9f5; }
    body.has-banner { display: flex; flex-direction: column; }
    [role=application] {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
    }
    [role=application] > iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .bridge-pane {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: system-ui, sans-serif;
      color: #333;
      gap: 1.5em;
    }
    .bridge-pane .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #16B378;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bridge-pane button {
      padding: 0.6em 1.4em;
      font-size: 1em;
      border: 0;
      border-radius: 4px;
      background: #16B378;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div role="application"
       data-cozy="{{.CozyData}}"
       data-cozy-domain="{{.Domain}}"
       data-cozy-token="{{.Token}}"
       data-cozy-locale="{{.Locale}}"
       data-cozy-app-slug="{{.AppSlug}}"
       data-cozy-app-name="Grist"
       data-cozy-app-name-prefix=""
       data-cozy-app-editor="{{.AppEditor}}"
       data-cozy-icon-path="icon.png">
  </div>
  <script src="bar.js" defer></script>
  <script>
  (function () {
    const GRIST_BASE = 'https://grist.dev-twake.maudet.cloud';
    const root = document.querySelector('[role=application]');
    const cozyToken = root.dataset.cozyToken;
    const cozyDomain = root.dataset.cozyDomain;

    function renderIframe(src) {
      root.innerHTML = '';
      const f = document.createElement('iframe');
      f.src = src || GRIST_BASE + '/';
      f.title = 'Grist';
      root.appendChild(f);
    }

    function renderBridgePane(msg, action) {
      root.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'bridge-pane';
      const sp = document.createElement('div');
      sp.className = 'spinner';
      const txt = document.createElement('div');
      txt.textContent = msg;
      div.appendChild(sp);
      div.appendChild(txt);
      if (action) {
        const btn = document.createElement('button');
        btn.textContent = action.label;
        btn.onclick = action.onClick;
        div.appendChild(btn);
      }
      root.appendChild(div);
    }

    async function gristFetch(path, opts = {}) {
      const res = await fetch(GRIST_BASE + path, Object.assign({
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
      }, opts));
      return res;
    }

    async function cozyPost(path, body) {
      const res = await fetch('https://' + cozyDomain + path, {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Authorization': 'Bearer ' + cozyToken,
          'Content-Type': 'application/vnd.api+json',
          'Accept': 'application/vnd.api+json'
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error('cozy POST ' + path + ' → ' + res.status + ' ' + txt);
      }
      return res.json();
    }

    // Title-sync helpers: keep the .url shortcut in the Drive aligned with
    // the current Grist doc title. Called on iframe mount and again when the
    // tab is hidden / unloads, so Grist renames made during the session
    // propagate back without any user action.
    // Cozy /files/_find requires a Mango index on the queried fields.
    // We create it lazily the first time we need to look up by docId; the
    // POST is idempotent (returns the existing index on subsequent calls).
    let indexEnsured;
    async function ensureGristDocIdIndex() {
      if (indexEnsured) return indexEnsured;
      indexEnsured = fetch('https://' + cozyDomain + '/data/io.cozy.files/_index', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Authorization': 'Bearer ' + cozyToken,
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({
          index: { fields: ['metadata.target.app', 'metadata.target.docId'] },
          name: 'by-grist-target-docid',
          ddoc: 'by-grist-target-docid',
          type: 'json'
        })
      }).then(r => r.ok || r.status === 409).catch(() => false);
      return indexEnsured;
    }

    async function findShortcutByDocId(docId) {
      await ensureGristDocIdIndex();
      const res = await fetch('https://' + cozyDomain + '/files/_find', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Authorization': 'Bearer ' + cozyToken,
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({
          selector: {
            'metadata.target.app': 'grist',
            'metadata.target.docId': docId
          },
          use_index: '_design/by-grist-target-docid',
          limit: 1
        })
      });
      if (!res.ok) {
        console.warn('[grist] _find failed:', res.status, await res.text());
        return null;
      }
      const body = await res.json();
      const rows = (body && (body.data || body.docs)) || [];
      return rows[0] || null;
    }

    async function fetchGristDocName(docId) {
      const res = await gristFetch('/api/docs/' + encodeURIComponent(docId));
      if (!res.ok) return null;
      const data = await res.json();
      return (data && data.name) || null;
    }

    async function syncShortcutName(docId, opts = {}) {
      try {
        const [gristName, shortcut] = await Promise.all([
          fetchGristDocName(docId),
          findShortcutByDocId(docId)
        ]);
        if (!gristName) { console.log('[grist] title sync: Grist name not fetchable'); return; }
        if (!shortcut) { console.log('[grist] title sync: no Drive shortcut found for docId', docId); return; }
        // .url suffix is required by the Drive to keep the icon/handler.
        const want = gristName + '.url';
        const current = (shortcut.attributes && shortcut.attributes.name) || shortcut.name || '';
        if (current === want) { console.log('[grist] title sync: already in sync', current); return; }
        const fileId = shortcut.id || shortcut._id;
        console.log('[grist] title sync:', current, '→', want, '(fileId', fileId + ')');
        const url = 'https://' + cozyDomain + '/files/' + fileId;
        const res = await fetch(url, {
          method: 'PATCH',
          credentials: 'include',
          keepalive: !!opts.keepalive,
          headers: {
            'Authorization': 'Bearer ' + cozyToken,
            'Content-Type': 'application/vnd.api+json',
            'Accept': 'application/vnd.api+json'
          },
          body: JSON.stringify({
            data: {
              type: 'io.cozy.files',
              id: fileId,
              attributes: { name: want }
            }
          })
        });
        if (!res.ok) console.warn('[grist] title sync PATCH', res.status, await res.text());
        else console.log('[grist] title sync OK');
      } catch (e) {
        console.warn('[grist] title sync failed:', e);
      }
    }

    function installTitleSync(docId) {
      // 1. On mount — bring the shortcut up to date with whatever the user
      // already changed since the last visit.
      syncShortcutName(docId);
      // 2. Whenever the tab goes hidden (close, switch, navigate away),
      // push the latest title back. Using `keepalive` so the PATCH can
      // outlive the unload.
      const onHide = () => {
        if (document.visibilityState === 'hidden') {
          syncShortcutName(docId, { keepalive: true });
        }
      };
      document.addEventListener('visibilitychange', onHide);
      window.addEventListener('pagehide', () =>
        syncShortcutName(docId, { keepalive: true })
      );
    }

    async function bridgeCreate(folderId) {
      renderBridgePane('Création du document Grist…');

      // 1. ensure user has a Grist session — list orgs
      let res = await gristFetch('/api/orgs');
      if (res.status === 401 || res.status === 403) {
        // No Grist session: send user to Grist to log in, with return-here in mind.
        renderBridgePane(
          'Tu dois d\'abord te connecter à Grist. Une nouvelle fenêtre va s\'ouvrir.',
          { label: 'Se connecter à Grist', onClick: () => {
            window.open(GRIST_BASE + '/', '_blank');
            renderBridgePane('Une fois connecté à Grist, recharge cette page.',
              { label: 'Recharger', onClick: () => location.reload() });
          } }
        );
        return;
      }
      if (!res.ok) throw new Error('GET /api/orgs → ' + res.status);
      const orgs = await res.json();
      if (!orgs.length) throw new Error('Aucune organisation Grist trouvée pour cet utilisateur.');
      // Grist runs in single-org mode (GRIST_SINGLE_ORG=twake-dev). The /api/orgs
      // response always includes the user's auto-provisioned "docs-N" personal org
      // alongside the canonical one, so we must prefer the non-personal one
      // (anything that isn't a Grist-managed personal sandbox).
      const org = orgs.find(o => !/^docs-\d+$/.test(o.domain || '')) || orgs[0];

      // 2. find first workspace in the chosen org
      res = await gristFetch('/api/orgs/' + org.id + '/workspaces');
      if (!res.ok) throw new Error('GET workspaces → ' + res.status);
      const workspaces = await res.json();
      if (!workspaces.length) throw new Error('Aucun workspace Grist disponible.');
      const ws = workspaces[0];

      // 3. create the doc
      const docName = 'Sans titre';
      res = await gristFetch('/api/workspaces/' + ws.id + '/docs', {
        method: 'POST',
        body: JSON.stringify({ name: docName })
      });
      if (!res.ok) throw new Error('POST doc → ' + res.status + ' ' + await res.text());
      // Grist returns a quoted JSON string with the doc id
      const docIdRaw = await res.text();
      const docId = docIdRaw.replace(/^"|"$/g, '');

      // The doc lives at this canonical URL — Grist resolves the right org itself.
      const docUrl = GRIST_BASE + '/doc/' + docId;
      // But we want the user to keep the Cozy bar, so the *visible* URL
      // (in the shortcut + the post-create navigation) stays inside this
      // coquille; the route #/doc/<docId> renders an iframe to docUrl.
      const shellUrl = location.origin + '/#/doc/' + docId;

      // 4. materialize a shortcut in the Drive folder.
      // The {app, docId} metadata is what the cleanup-grist service reads
      // when this shortcut is later purged from the Drive trash, so that
      // it can DELETE the matching Grist doc.
      await cozyPost('/shortcuts', {
        data: {
          type: 'io.cozy.files.shortcuts',
          attributes: {
            name: docName + '.url',
            dir_id: folderId,
            url: shellUrl,
            metadata: {
              target: { app: 'grist', docId: docId, orgDomain: org.domain }
            }
          }
        }
      });

      // 5. open the new doc in place — replace the URL (so a refresh lands
      // on the same doc, and the Drive shortcut URL stays correct) and
      // swap the bridge pane for the iframe. We can't navigate to shellUrl
      // here because it's the same origin + same path + only the hash
      // differs, so the browser would just update the hash without
      // re-executing this script.
      history.replaceState(null, '', '/#/doc/' + docId);
      renderIframe(docUrl);
      installTitleSync(docId);
    }

    // Hash router.
    // - #/bridge/grist/new/<folderId>  → create Grist doc + Drive shortcut, then redirect
    // - #/doc/<docId>                  → embed a specific Grist doc in iframe
    // - anything else                  → embed the Grist home in iframe
    const hash = location.hash || '';
    let m = hash.match(/^#\/bridge\/grist\/new\/([^/?#]+)/);
    if (m) {
      bridgeCreate(decodeURIComponent(m[1])).catch(err => {
        console.error(err);
        renderBridgePane('Erreur : ' + (err.message || err),
          { label: 'Retour à Grist', onClick: () => location.hash = '' });
      });
    } else if ((m = hash.match(/^#\/doc\/([^/?#]+)/))) {
      const docId = decodeURIComponent(m[1]);
      renderIframe(GRIST_BASE + '/doc/' + docId);
      installTitleSync(docId);
    } else {
      renderIframe();
    }
  })();
  </script>
</body>
</html>
